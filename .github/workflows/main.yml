name: Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}

          script: |
                  cd ~/wfs

                  echo "📂 Current directory:"
                  pwd
                  ls -la
                
                  echo "🔄 Pulling latest code..."
                  git fetch origin
                  git reset --hard origin/main
                
                  echo "📌 Latest commit:"
                  git log -1
                
                  echo "📦 Installing deps..."
                  bun install
                
                  echo "🧹 Cleaning old build..."
                  rm -rf .next
                
                  echo "🏗 Building..."
                  bun run build
                
                  echo "🚀 Restarting PM2..."
                  pm2 restart frontend-goel-enterprises
                
                  echo "✅ Deployment done"
